# ============================
# 老宋速达 - nginx 配置文件
# 用法：把下面 PROJECT_PATH 改成你的项目路径，然后：
#   启动：nginx -c "/你的路径/nginx-mac.conf"
#   停止：nginx -s stop
#   重启：nginx -s reload -c "/你的路径/nginx-mac.conf"
# ============================

worker_processes 1;

pid /Users/huxinyang/Desktop/正常版本/Intern/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /opt/homebrew/etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    upstream backend {
        server 127.0.0.1:8080;
    }

    server {
        listen 8082;
        server_name localhost;

        # ↓↓↓ 把这一行改成你的项目路径 ↓↓↓
        root /Users/huxinyang/Desktop/正常版本/Intern/nginx-1.20.2/html/sky;
        index index.html;
        try_files $uri $uri/ /index.html;

        location /api/ {
            proxy_set_header Host localhost:8080;
            proxy_pass http://backend/admin/;
        }

        location /user/ {
            proxy_set_header Host localhost:8080;
            proxy_pass http://backend/user/;
        }

        location /ws/ {
            proxy_set_header Host localhost:8080;
            proxy_pass http://backend/ws/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
