name: Java CI with Maven

# 触发条件：当有代码推送到以下分支，或者针对这些分支提交 Pull Request 时触发流水线
on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]

jobs:
  build-and-test:
    # 流水线运行环境使用最新的 Ubuntu 虚拟机系统
    runs-on: ubuntu-latest

    steps:
      # 第一步：拉取仓库中的代码到虚拟机中
      - name: Checkout repository
        uses: actions/checkout@v4

      # 第二步：配置 Java 开发环境
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'       # 团队预期的 JDK 版本（Spring Boot 3.x 要求 JDK 17+）
          distribution: 'temurin'  # 选用企业常用的开源生产级 JDK 发行版
          cache: 'maven'           # 开启 Maven 依赖缓存，大幅缩短后续构建时间

      # 第三步：编译代码并执行测试
      - name: Build with Maven and Run Tests
        run: mvn -B clean verify